services:
  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./expenses.db:/app/expenses.db
      - ./static:/app/static
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/app/static
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
