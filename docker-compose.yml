services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - ./expenses.db:/app/expenses.db
      - ./static:/app/static
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/app/static
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
