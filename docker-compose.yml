services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - ./expenses.db:/app/expenses.db
      - static-data:/app/static

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static-data:/app/static
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
  static-data:
