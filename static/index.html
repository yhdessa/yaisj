<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker VPS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen font-sans antialiased">

  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-900">Expense Tracker <span class="text-indigo-600">VPS</span></h1>
      <span class="text-sm text-gray-500">Personal Finance</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <div class="lg:col-span-1">
        <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 sticky top-6">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">Новая трата</h2>
          <form id="expenseForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Сумма</label>
              <input type="number" step="0.01" id="amount" required min="0.01"
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
              <input type="text" id="category" required placeholder="Еда, Транспорт..."
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
              <input type="text" id="description" placeholder="Обед с коллегами"
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition">
              Добавить трату
            </button>
          </form>
        </div>
      </div>

      <div class="lg:col-span-2 space-y-6">

        <div class="bg-white rounded-xl shadow-md p-4 flex flex-wrap gap-3">
          <input type="text" id="searchInput" placeholder="Поиск по описанию..."
                 class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:border-indigo-500">
          <select id="categoryFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:border-indigo-500">
            <option value="">Все категории</option>
          </select>
          <button onclick="clearFilters()" 
                  class="px-5 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg transition">
            Сбросить
          </button>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">Все расходы</h2>
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дата</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Сумма</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Категория</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Описание</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-24">Действия</th>
                </tr>
              </thead>
              <tbody id="expensesList" class="divide-y divide-gray-200"></tbody>
            </table>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">Сумма по категориям</h2>
          <div id="categorySummary" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

      </div>
    </div>

    <div class="mt-8 bg-white rounded-xl shadow-md p-6 border border-gray-100">
      <h2 class="text-xl font-semibold mb-4 text-gray-800">Состояние сервера 
        <span class="text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-full">обновляется каждые 5 сек</span>
      </h2>
      <div id="systemStats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

  </main>

  <footer class="mt-12 py-8 text-center text-gray-500 text-sm">
    Expense Tracker VPS • 2026
  </footer>

  <script>
    const API_BASE = '';

    async function loadExpenses() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const categoryFilter = document.getElementById('categoryFilter').value;

      try {
        const res = await fetch(`${API_BASE}/expenses/`);
        let expenses = await res.json();

        if (categoryFilter) {
          expenses = expenses.filter(exp => exp.category === categoryFilter);
        }
        if (search) {
          expenses = expenses.filter(exp => 
            exp.description && exp.description.toLowerCase().includes(search)
          );
        }

        const tbody = document.getElementById('expensesList');
        tbody.innerHTML = '';

        expenses.forEach(exp => {
          const row = document.createElement('tr');
          row.className = 'hover:bg-gray-50 transition-colors';
          row.innerHTML = `
            <td class="px-4 py-4 text-sm">${exp.date}</td>
            <td class="px-4 py-4 font-medium">${exp.amount.toFixed(2)} ₽</td>
            <td class="px-4 py-4">${exp.category}</td>
            <td class="px-4 py-4 text-gray-600">${exp.description || '—'}</td>
            <td class="px-4 py-4">
              <button onclick="editExpense(${exp.id})" class="text-blue-600 hover:text-blue-800 mr-4 text-lg">✏️</button>
              <button onclick="deleteExpense(${exp.id})" class="text-red-600 hover:text-red-800 text-lg">🗑</button>
            </td>
          `;
          tbody.appendChild(row);
        });

        updateCategoryFilter(expenses);
        updateCategorySummary(expenses);

      } catch (err) {
        console.error('Ошибка загрузки расходов:', err);
      }
    }

    function updateCategoryFilter(expenses) {
      const select = document.getElementById('categoryFilter');
      const currentValue = select.value;

      const categories = [...new Set(expenses.map(exp => exp.category))].sort();

      select.innerHTML = '<option value="">Все категории</option>';

      categories.forEach(cat => {//
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });

      if (categories.includes(currentValue)) {
        select.value = currentValue;
      }
    }

    function updateCategorySummary(expenses) {
      const map = {};
      expenses.forEach(exp => {
        map[exp.category] = (map[exp.category] || 0) + exp.amount;
      });

      const container = document.getElementById('categorySummary');
      container.innerHTML = '';

      Object.keys(map).forEach(cat => {
        const div = document.createElement('div');
        div.className = "bg-gray-50 px-5 py-4 rounded-xl flex justify-between items-center";
        div.innerHTML = `
          <span class="font-medium text-gray-700">${cat}</span>
          <span class="text-lg font-semibold text-indigo-600">${map[cat].toFixed(2)} ₽</span>
        `;
        container.appendChild(div);
      });
    }

    async function loadSystemStats() {
      try {
        const res = await fetch(`${API_BASE}/system/`);
        const data = await res.json();
        const container = document.getElementById('systemStats');
        container.innerHTML = `
          <div class="bg-indigo-50 p-5 rounded-xl">
            <div class="text-indigo-600 text-sm">CPU</div>
            <div class="text-3xl font-bold">${data.cpu_percent}%</div>
          </div>
          <div class="bg-blue-50 p-5 rounded-xl">
            <div class="text-blue-600 text-sm">Память</div>
            <div class="text-3xl font-bold">${data.memory_percent}%</div>
          </div>
          <div class="bg-green-50 p-5 rounded-xl">
            <div class="text-green-600 text-sm">Диск</div>
            <div class="text-3xl font-bold">${data.disk_percent}%</div>
          </div>
          <div class="bg-purple-50 p-5 rounded-xl">
            <div class="text-purple-600 text-sm">Сеть</div>
            <div class="text-3xl font-bold">${(data.bytes_sent_mb + data.bytes_recv_mb).toFixed(0)} MB</div>
          </div>
        `;
      } catch (err) {
        console.error('Ошибка загрузки статистики:', err);
      }
    }

    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value.trim();
      const description = document.getElementById('description').value.trim();

      if (!amount || !category) return;

      try {
        await fetch(`${API_BASE}/expenses/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, category, description })
        });

        document.getElementById('amount').value = '';
        document.getElementById('category').value = '';
        document.getElementById('description').value = '';
        loadExpenses();
      } catch (err) {
        alert('Ошибка при добавлении: ' + err.message);
      }
    });

    async function deleteExpense(id) {
      if (!confirm('Удалить эту трату?')) return;
      const res = await fetch(`${API_BASE}/expenses/${id}`, { method: 'DELETE' });
      if (res.ok) loadExpenses();
    }

    async function editExpense(id) {
      const newAmount = prompt('Новая сумма:');
      if (newAmount === null) return;
      const newCategory = prompt('Новая категория:');
      if (newCategory === null) return;
      const newDescription = prompt('Новое описание:') || '';

      const res = await fetch(`${API_BASE}/expenses/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: parseFloat(newAmount),
          category: newCategory.trim(),
          description: newDescription.trim()
        })
      });

      if (res.ok) loadExpenses();
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = '';
      loadExpenses();
    }

    document.getElementById('searchInput').addEventListener('input', loadExpenses);
    document.getElementById('categoryFilter').addEventListener('change', loadExpenses);

    loadExpenses();
    loadSystemStats();
    setInterval(loadSystemStats, 5000);
  </script>
</body>
</html>
